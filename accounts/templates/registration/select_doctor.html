{% extends 'booking/base.html' %}

{% block title %}Book Appointment - Step 1{% endblock %}

{% block content %}
<div class="card">
    <h2>Book Appointment - Step 1 of 2</h2>
    <p style="color: #666; margin-bottom: 2rem;">Select doctor and preferred date</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="doctor">Select Doctor *</label>
            <select name="doctor" id="doctor" required>
                <option value="">-- Choose a doctor --</option>
                {% for doctor in doctors %}
                <option value="{{ doctor.id }}" {% if request.GET.doctor == doctor.id|stringformat:"i" %}selected{% endif %}>
                    Dr. {{ doctor.name }} - {{ doctor.specialty }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="date">Select Date *</label>
            <input type="date" 
                   name="date" 
                   id="date" 
                   required
                   min="{{ min_date }}"
                   max="{{ max_date }}"
                   value="{{ request.GET.date }}">
            <small style="color: #666;">Available dates: next 30 days</small>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-success">Continue to Select Time</button>
            <a href="{% url 'booking:index' %}" class="btn">Cancel</a>
        </div>
    </form>
</div>

<script>
    // Pre-select doctor if passed in URL
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const doctorId = urlParams.get('doctor');
        if (doctorId) {
            document.getElementById('doctor').value = doctorId;
        }
    });
</script>
{% endblock %}
